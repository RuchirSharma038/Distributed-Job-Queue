version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: job_queue_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: job_queue
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis_queue:
    image: redis:7-alpine
    container_name: job_queue_redis
    restart: always
    ports:
      - "6379:6379"

  redis_insight:
    image: redis/redisinsight:latest
    container_name: job_queue_insight
    restart: always
    ports:
      - "5540:5540"

volumes:
  pgdata: